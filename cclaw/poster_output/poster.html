<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
  font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  position: relative;
  overflow: hidden;
}

/* Background code pattern */
.code-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0.03;
  font-family: "Courier New", monospace;
  font-size: 14px;
  color: #00ff88;
  line-height: 1.6;
  padding: 20px;
  white-space: pre-wrap;
  word-break: break-all;
}

/* Main container */
.container {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 50px;
}

/* Photo container */
.photo-container {
  width: 420px;
  height: 420px;
  border-radius: 50%;
  overflow: hidden;
  border: 4px solid #00d4ff;
  box-shadow: 0 0 60px rgba(0, 212, 255, 0.3), 0 0 120px rgba(0, 212, 255, 0.1);
  margin-top: 40px;
  position: relative;
}

.photo-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Glitch effect overlay */
.glitch-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 212, 255, 0.03) 2px,
    rgba(0, 212, 255, 0.03) 4px
  );
  pointer-events: none;
}

/* Actor name */
.actor-name {
  font-size: 120px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 20px;
  margin-top: 60px;
  text-transform: uppercase;
  text-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
}

/* Title */
.title {
  font-size: 72px;
  font-weight: 700;
  color: #00d4ff;
  margin-top: 30px;
  letter-spacing: 8px;
}

/* Divider */
.divider {
  width: 200px;
  height: 3px;
  background: linear-gradient(90deg, transparent, #ff6b6b, transparent);
  margin: 50px 0;
}

/* Hook line */
.hook-container {
  background: rgba(255, 255, 255, 0.05);
  border-left: 4px solid #ff6b6b;
  padding: 40px 50px;
  max-width: 900px;
  margin-top: 20px;
}

.hook-line {
  font-size: 48px;
  color: #ffffff;
  font-weight: 500;
  line-height: 1.6;
  text-align: center;
}

.hook-line .quote {
  color: #ff6b6b;
  font-size: 60px;
  line-height: 0;
}

/* Age highlight */
.age-highlight {
  color: #ffd93d;
  font-weight: 700;
}

/* Brand */
.brand {
  position: absolute;
  bottom: 60px;
  font-size: 24px;
  color: rgba(255, 255, 255, 0.4);
  letter-spacing: 4px;
}

/* Decorative elements */
.deco-line {
  position: absolute;
  width: 2px;
  height: 150px;
  background: linear-gradient(180deg, transparent, #00d4ff, transparent);
}
.deco-left { left: 80px; top: 300px; }
.deco-right { right: 80px; top: 500px; }

/* Floating brackets */
.bracket {
  position: absolute;
  font-size: 200px;
  color: rgba(0, 212, 255, 0.08);
  font-weight: 100;
}
.bracket-left { left: 30px; top: 200px; }
.bracket-right { right: 30px; bottom: 400px; }
</style>
</head>
<body>
<div class="code-bg">function life() {
  const age = 35;
  const bugs = Infinity;
  const fixed = 0;
  
  while (alive) {
    try {
      fixBugs();
    } catch (AI) {
      becomeObsolete();
    }
  }
  
  return "一个Bug都没修好的人生";
}</div>

<div class="bracket bracket-left">{</div>
<div class="bracket bracket-right">}</div>

<div class="deco-line deco-left"></div>
<div class="deco-line deco-right"></div>

<div class="container">
  <div class="photo-container">
    <img src="file:///C:/Users/tiger/Desktop/狼人杀/狼人杀头像(1).jpg" alt="Diego">
    <div class="glitch-overlay"></div>
  </div>
  
  <div class="actor-name">DIEGO</div>
  
  <div class="title">AI打败了程序员</div>
  
  <div class="divider"></div>
  
  <div class="hook-container">
    <div class="hook-line">
      <span class="quote">"</span>
      <span class="age-highlight">35岁</span>，一个Bug都没修好的人生
      <span class="quote">"</span>
    </div>
  </div>
  
  <div class="brand">CCLAW 喜剧龙虾</div>
</div>
</body>
</html>
